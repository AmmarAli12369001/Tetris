<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TETRIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scanlines"></div>

  <div class="arcade-cabinet">

    <header class="marquee">
      <span class="marquee-text">TETRIS</span>
      <div class="marquee-lights">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </header>

    <main class="game-area">

      <!-- Left panel -->
      <aside class="panel panel-left">
        <div class="panel-block">
          <div class="label">SCORE</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="panel-block">
          <div class="label">LEVEL</div>
          <div class="value" id="level">1</div>
        </div>
        <div class="panel-block">
          <div class="label">LINES</div>
          <div class="value" id="lines">0</div>
        </div>
        <div class="panel-block">
          <div class="label">HIGH</div>
          <div class="value" id="highscore">0</div>
        </div>
      </aside>

      <!-- Game canvas -->
      <div class="board-wrapper">
        <canvas id="board" width="300" height="600"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-content">
            <div class="overlay-title" id="overlay-title">TETRIS</div>
            <div class="overlay-sub" id="overlay-sub">INSERT COIN</div>
            <button class="btn-start" id="btn-start">▶ PLAY</button>
          </div>
        </div>
      </div>

      <!-- Right panel -->
      <aside class="panel panel-right">
        <div class="panel-block">
          <div class="label">NEXT</div>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>
        <div class="panel-block controls-info">
          <div class="label">CONTROLS</div>
          <div class="key-row"><kbd>←→</kbd> Move</div>
          <div class="key-row"><kbd>↑</kbd> Rotate</div>
          <div class="key-row"><kbd>↓</kbd> Soft Drop</div>
          <div class="key-row"><kbd>SPC</kbd> Hard Drop</div>
          <div class="key-row"><kbd>P</kbd> Pause</div>
        </div>
      </aside>

    </main>

    <footer class="cabinet-footer">
      <span id="status-msg">READY PLAYER ONE</span>
    </footer>

  </div>

  <script src="tetris.js"></script>
</body>
</html>
